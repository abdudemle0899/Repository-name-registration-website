<!DOCTYPE html>
<html>
<head>
    <title>Export Registrations</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { color: #333; margin-bottom: 20px; }
        .btn { background: #4CAF50; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 10px 5px; }
        .btn:hover { background: #45a049; }
        .btn-blue { background: #2196F3; }
        .btn-blue:hover { background: #1976D2; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #4CAF50; color: white; }
        tr:hover { background: #f5f5f5; }
        .count { background: #e3f2fd; padding: 10px 20px; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Registration Dashboard</h1>
        <p class="count">Total Registrations: <strong id="count">0</strong></p>
        
        <button class="btn" onclick="exportToCSV()">📥 Download Excel (CSV)</button>
        <button class="btn btn-blue" onclick="loadData()">🔄 Refresh</button>
        
        <div id="tableContainer"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBInthZ2BKHiy1hdvUvBdnngGDTBsceTUE",
            authDomain: "registration-system-8719c.firebaseapp.com",
            projectId: "registration-system-8719c",
            storageBucket: "registration-system-8719c.firebasestorage.app",
            messagingSenderId: "266476222439",
            appId: "1:266476222439:web:f1f06c9bb1b17775d3af42"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let registrations = [];

        async function loadData() {
            const snapshot = await db.collection('registrations').orderBy('registeredAt', 'desc').get();
            registrations = [];
            snapshot.forEach(doc => {
                registrations.push({ id: doc.id, ...doc.data() });
            });
            displayTable();
            document.getElementById('count').textContent = registrations.length;
        }

        function displayTable() {
            let html = `<table>
                <thead><tr>
                    <th>#</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Registered Date</th>
                </tr></thead>
                <tbody>`;
            
            registrations.forEach((reg, index) => {
                const date = reg.registeredAt ? reg.registeredAt.toDate().toLocaleString() : 'N/A';
                html += `<tr>
                    <td>${index + 1}</td>
                    <td>${reg.fullName || 'N/A'}</td>
                    <td>${reg.email || 'N/A'}</td>
                    <td>${reg.phone || 'N/A'}</td>
                    <td>${date}</td>
                </tr>`;
            });
            
            html += `</tbody></table>`;
            document.getElementById('tableContainer').innerHTML = html;
        }

        function exportToCSV() {
            let csv = 'Number,Full Name,Email,Phone,Registered Date\n';
            registrations.forEach((reg, index) => {
                const date = reg.registeredAt ? reg.registeredAt.toDate().toLocaleString() : 'N/A';
                csv += `"${index + 1}","${reg.fullName || ''}","${reg.email || ''}","${reg.phone || ''}","${date}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'registrations_' + new Date().toISOString().split('T')[0] + '.csv';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            alert('✅ Downloaded! Open the file in Excel.');
        }

        loadData();
    </script>
</body>
</html>
