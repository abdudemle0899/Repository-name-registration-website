                            <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dating App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.0.16/index.css" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 50%, #6366f1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.4); }
        .input-group:focus-within input { border-color: #ec4899; box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1); }
        .loading-spinner {
            border: 2px solid #ffffff30;
            border-top-color: #ffffff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert { padding: 0.75rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; display: none; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="glass-panel fade-in">
    <div class="h-2 bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500"></div>
    <div class="p-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-pink-500 to-purple-600 rounded-2xl mb-4 shadow-lg">
                <i class="ri-heart-3-fill text-3xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Welcome Back</h1>
            <p class="text-gray-500 text-sm">Sign in to find your match</p>
        </div>

        <div id="loginError" class="alert alert-error">
            <i class="ri-error-warning-fill"></i> <span id="errorText"></span>
        </div>

        <form id="loginForm" class="space-y-5">
            <div class="input-group">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                <div class="relative">
                    <span class="absolute left-3.5 top-3 text-gray-400"><i class="ri-mail-line"></i></span>
                    <input type="email" id="email" required 
                        class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none transition-all bg-white" 
                        placeholder="you@example.com">
                </div>
            </div>

            <div class="input-group">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                <div class="relative">
                    <span class="absolute left-3.5 top-3 text-gray-400"><i class="ri-lock-line"></i></span>
                    <input type="password" id="password" required 
                        class="w-full pl-11 pr-10 py-2.5 rounded-xl border border-gray-300 focus:outline-none transition-all bg-white" 
                        placeholder="••••••">
                    <button type="button" onclick="togglePassword()" class="absolute right-3 top-3 text-gray-400">
                        <i class="ri-eye-off-line" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="loginBtn" 
                class="btn-primary w-full text-white font-semibold py-3 rounded-xl shadow-lg flex justify-center items-center gap-2">
                <span>Sign In</span>
                <i class="ri-login-circle-line"></i>
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-gray-200 text-center">
            <p class="text-sm text-gray-600">
                Don't have an account? 
                <a href="index.html" class="text-pink-600 hover:text-pink-500 font-semibold">Sign Up</a>
            </p>
        </div>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBInthZ2BKHiy1hdvUvBdnngGDTBsceTUE",
        authDomain: "registration-system-8719c.firebaseapp.com",
        projectId: "registration-system-8719c",
        storageBucket: "registration-system-8719c.firebasestorage.app",
        messagingSenderId: "266476222439",
        appId: "1:266476222439:web:f1f06c9bb1b17775d3af42"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Check if already logged in
    auth.onAuthStateChanged(user => {
        if (user) {
            window.location.href = 'dashboard.html';
        }
    });

    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'ri-eye-line';
        } else {
            input.type = 'password';
            icon.className = 'ri-eye-off-line';
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('loginError');
        const errorText = document.getElementById('errorText');

        btn.disabled = true;
        btn.innerHTML = '<div class="loading-spinner"></div> Signing In...';
        errorDiv.style.display = 'none';

        try {
            // Sign in with Firebase Auth
            await auth.signInWithEmailAndPassword(email, password);
            
            // Redirect to dashboard
            window.location.href = 'dashboard.html';
            
        } catch (error) {
            btn.disabled = false;
            btn.innerHTML = '<span>Sign In</span><i class="ri-login-circle-line"></i>';
            errorText.textContent = error.message;
            errorDiv.style.display = 'flex';
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Match | Dating App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.0.16/index.css" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; min-height: 100vh; }
        .nav-bar { background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%); }
        .profile-card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; transition: all 0.3s; }
        .profile-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .btn-like { background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%); }
        .btn-pass { background: linear-gradient(135deg, #6b7280 0%, #9ca3af 100%); }
        .btn-chat { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #ec4899; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden-section { display: none; }
        .match-notification { position: fixed; top: 20px; right: 20px; background: #ec4899; color: white; padding: 1rem 1.5rem; border-radius: 0.5rem; box-shadow: 0 10px 25px rgba(236,72,153,0.4); z-index: 100; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="nav-bar text-white py-4 px-6 shadow-lg">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-3">
            <i class="ri-heart-3-fill text-3xl"></i>
            <span class="text-xl font-bold">LoveConnect</span>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="showSection('browse')" class="hover:opacity-80"><i class="ri-user-search-line text-xl"></i></button>
            <button onclick="showSection('matches')" class="hover:opacity-80"><i class="ri-heart-line text-xl"></i></button>
            <button onclick="showSection('messages')" class="hover:opacity-80"><i class="ri-message-3-line text-xl"></i></button>
            <button onclick="logout()" class="hover:opacity-80"><i class="ri-logout-box-line text-xl"></i></button>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="max-w-6xl mx-auto p-6">

    <!-- Browse Users Section -->
    <div id="browseSection">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Discover People</h2>
        <div id="usersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="flex justify-center items-center py-20">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <!-- Matches Section -->
    <div id="matchesSection" class="hidden-section">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Your Matches</h2>
        <div id="matchesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- Messages Section -->
    <div id="messagesSection" class="hidden-section">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Messages</h2>
        <div id="messagesList" class="space-y-4"></div>
    </div>

</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBInthZ2BKHiy1hdvUvBdnngGDTBsceTUE",
        authDomain: "registration-system-8719c.firebaseapp.com",
        projectId: "registration-system-8719c",
        storageBucket: "registration-system-8719c.firebasestorage.app",
        messagingSenderId: "266476222439",
        appId: "1:266476222439:web:f1f06c9bb1b17775d3af42"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;

    // Check Authentication
    auth.onAuthStateChanged(async user => {
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = user;
        loadUsers();
    });

    // Show/Hide Sections
    function showSection(section) {
        document.getElementById('browseSection').classList.toggle('hidden-section', section !== 'browse');
        document.getElementById('matchesSection').classList.toggle('hidden-section', section !== 'matches');
        document.getElementById('messagesSection').classList.toggle('hidden-section', section !== 'messages');
        
        if (section === 'matches') loadMatches();
        if (section === 'messages') loadMessages();
    }

    // Load All Users
    async function loadUsers() {
        const snapshot = await db.collection('registrations').get();
        const users = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            if (data.email !== currentUser.email) {
                users.push({ id: doc.id, ...data });
            }
        });
        displayUsers(users);
    }

    function displayUsers(users) {
        const grid = document.getElementById('usersGrid');
        if (users.length === 0) {
            grid.innerHTML = '<p class="text-gray-500 text-center col-span-3">No users yet. Be the first!</p>';
            return;
        }
        grid.innerHTML = users.map(user => `
            <div class="profile-card">
                <div class="h-48 bg-gradient-to-br from-pink-400 to-purple-500 flex items-center justify-center">
                    <i class="ri-user-line text-6xl text-white/50"></i>
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-lg text-gray-800">${user.fullName || 'Anonymous'}</h3>
                    <p class="text-gray-500 text-sm">${user.email || ''}</p>
                    <div class="flex gap-2 mt-4">
                        <button onclick="likeUser('${user.id}', '${user.email}')" class="btn-like flex-1 text-white py-2 rounded-lg font-medium">
                            <i class="ri-heart-fill"></i> Like
                        </button>
                        <button onclick="startChat('${user.id}', '${user.email}')" class="btn-chat flex-1 text-white py-2 rounded-lg font-medium">
                            <i class="ri-message-line"></i> Chat
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Like User
    async function likeUser(userId, userEmail) {
        try {
            await db.collection('likes').add({
                from: currentUser.email,
                to: userEmail,
                fromId: currentUser.uid,
                toId: userId,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Check if mutual like (match!)
            const mutual = await db.collection('likes')
                .where('from', '==', userEmail)
                .where('to', '==', currentUser.email)
                .limit(1)
                .get();

            if (!mutual.empty) {
                // It's a match!
                await db.collection('matches').add({
                    user1: currentUser.email,
                    user2: userEmail,
                    user1Id: currentUser.uid,
                    user2Id: userId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showNotification('🎉 It\'s a Match!');
            } else {
                alert('❤️ You liked ' + userEmail);
            }
        } catch (error) {
            alert('Error: ' + error.message);
        }
    }

    // Start Chat
    function startChat(userId, userEmail) {
        alert('Chat feature - Messages will appear here! (userId: ' + userId + ')');
    }

    // Load Matches
    async function loadMatches() {
        const snapshot = await db.collection('matches')
            .where('user1', '==', currentUser.email)
            .get();
        
        const matches = [];
        snapshot.forEach(doc => matches.push(doc.data()));

        const grid = document.getElementById('matchesGrid');
        if (matches.length === 0) {
            grid.innerHTML = '<p class="text-gray-500 text-center col-span-3">No matches yet. Keep liking!</p>';
            return;
        }

        grid.innerHTML = matches.map(match => {
            const otherUser = match.user1 === currentUser.email ? match.user2 : match.user1;
            return `
                <div class="profile-card">
                    <div class="h-32 bg-gradient-to-br from-green-400 to-emerald-500 flex items-center justify-center">
                        <i class="ri-heart-fill text-5xl text-white/50"></i>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-lg text-gray-800">${otherUser}</h3>
                        <p class="text-green-600 text-sm"><i class="ri-checkbox-circle-fill"></i> Matched!</p>
                        <button onclick="startChat('', '${otherUser}')" class="btn-chat w-full text-white py-2 rounded-lg font-medium mt-3">
                            <i class="ri-message-line"></i> Send Message
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Load Messages
    function loadMessages() {
        const list = document.getElementById('messagesList');
        list.innerHTML = '<p class="text-gray-500 text-center py-10">No messages yet. Match with someone first!</p>';
    }

    // Show Match Notification
    function showNotification(message) {
        const div = document.createElement('div');
        div.className = 'match-notification';
        div.innerHTML = `<i class="ri-heart-fill"></i> ${message}`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    // Logout
    function logout() {
        auth.signOut().then(() => {
            window.location.href = 'login.html';
        });
    }
</script>

</body>
</html>
