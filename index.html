<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom password strength meter colors */
    .strength-0 {width: 0%}
    .strength-1 {width: 25%; background-color: #ef4444;} /* red */
    .strength-2 {width: 50%; background-color: #f59e0b;} /* amber */
    .strength-3 {width: 75%; background-color: #10b981;} /* green */
    .strength-4 {width: 100%; background-color: #047857;} /* dark green */
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>
    <form id="registrationForm" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" name="email" required
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500" />
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="password" name="password" required
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500" />
        <div class="mt-2 h-2 w-full bg-gray-200 rounded">
          <div id="strengthBar" class="h-full rounded strength-0"></div>
        </div>
        <p id="strengthText" class="text-xs mt-1"></p>
      </div>
      <div>
        <label for="confirm" class="block text-sm font-medium text-gray-700">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" required
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500" />
      </div>
      <div><button type="submit" class="w-full py-2 px-4 bg-indigo-600 text-white rounded hover:bg-indigo-700">Register</button></div>
    </form>
  </div>

  <script>
    // Password strength helper
    function evaluatePassword(password) {
      let score = 0;
      if (password.length >= 8) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;
      return score;
    }

    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');

    passwordInput.addEventListener('input', () => {
      const score = evaluatePassword(passwordInput.value);
      strengthBar.className = '';
      strengthBar.classList.add('h-full', 'rounded', `strength-${score}`);
      const labels = ['Too short', 'Weak', 'Fair', 'Good', 'Strong'];
      strengthText.textContent = labels[score];
    });

    const form = document.getElementById('registrationForm');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = passwordInput.value;
      const confirm = document.getElementById('confirm').value;

      // Basic validation
      if (password !== confirm) {
        alert('Passwords do not match');
        return;
      }
      if (evaluatePassword(password) < 3) {
        alert('Password is too weak');
        return;
      }

      // TODO: integrate with Firebase Authentication
      // Example setup (replace with your config in firebase.js):
      // import { getAuth, createUserWithEmailAndPassword } from "firebase/auth";
      // const auth = getAuth();
      // createUserWithEmailAndPassword(auth, email, password)
      //   .then((userCredential) => {
      //     // Registration successful
      //     const user = userCredential.user;
      //   })
      //   .catch((error) => {
      //     console.error(error);
      //   });

      alert('Form is valid and ready to submit to Firebase');
    });
  </script>
</body>
</html>
