<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Professional Registration System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <!-- Fontsource Inter -->
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.0.16/index.css" rel="stylesheet">
    
    <!-- Firebase SDK (REQUIRED) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 50%, #db2777 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-radius: 1.5rem;
            overflow: hidden;
        }
        .input-group:focus-within label { color: #4f46e5; }
        .input-group:focus-within input {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            transition: all 0.3s;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
        }
        .hidden-view { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-spinner {
            border: 2px solid #ffffff30;
            border-top-color: #ffffff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 0.5rem;
            background: #e5e7eb;
            overflow: hidden;
        }
        .password-strength-bar { height: 100%; width: 0%; transition: all 0.3s; }
        .strength-weak { background: #dc2626; width: 25%; }
        .strength-fair { background: #f59e0b; width: 50%; }
        .strength-good { background: #10b981; width: 75%; }
        .strength-strong { background: #059669; width: 100%; }
        .alert-box {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }
        .alert-success { background: #d1fae5; border: 1px solid #6ee7b7; color: #065f46; }
        .alert-error { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
    </style>
</head>
<body>

<div class="glass-panel w-full max-w-lg">
    <div class="h-2 bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600"></div>
    <div class="p-8">
        
        <!-- Registration Form -->
        <div id="registerView" class="fade-in">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mb-4 shadow-lg">
                    <i class="ri-user-add-line text-3xl text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">Create Your Account</h2>
                <p class="text-gray-500 text-sm">Join thousands of users today</p>
            </div>

            <div id="registerSuccess" class="alert-box alert-success">
                <i class="ri-checkbox-circle-fill text-lg"></i>
                <span>Registration successful! Data saved to database.</span>
            </div>

            <div id="registerError" class="alert-box alert-error">
                <i class="ri-error-warning-fill text-lg"></i>
                <span id="registerErrorText">An error occurred</span>
            </div>

            <form id="registerForm" class="space-y-5" novalidate>
                <!-- Full Name -->
                <div class="input-group">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Full Name</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-3 text-gray-400"><i class="ri-user-line"></i></span>
                        <input type="text" id="fullName" required 
                            class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none transition-all bg-white" 
                            placeholder="John Doe">
                    </div>
                </div>

                <!-- Email -->
                <div class="input-group">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-3 text-gray-400"><i class="ri-mail-line"></i></span>
                        <input type="email" id="email" required 
                            class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none transition-all bg-white" 
                            placeholder="john@example.com">
                    </div>
                </div>

                <!-- Phone -->
                <div class="input-group">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Phone Number</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-3 text-gray-400"><i class="ri-phone-line"></i></span>
                        <input type="tel" id="phone" 
                            class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none transition-all bg-white" 
                            placeholder="+251 9XX XXX XXX">
                    </div>
                </div>

                <!-- Password -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="input-group">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-3 text-gray-400"><i class="ri-lock-line"></i></span>
                            <input type="password" id="password" required minlength="6" 
                                class="w-full pl-11 pr-10 py-2.5 rounded-xl border border-gray-300 focus:outline-none transition-all bg-white" 
                                placeholder="••••••" oninput="checkPasswordStrength(this.value)">
                            <button type="button" onclick="togglePassword('password')" 
                                class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                                <i class="ri-eye-off-line" id="icon-password"></i>
                            </button>
                        </div>
                        <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
                    </div>
                    <div class="input-group">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Confirm Password</label>
                        <div class="relative">
                            <span class="absolute left-3.5 top-3 text-gray-400"><i class="ri-lock-2-line"></i></span>
                            <input type="password" id="confirmPassword" required 
                                class="w-full pl-11 pr-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none transition-all bg-white" 
                                placeholder="••••••">
                        </div>
                    </div>
                </div>

                <!-- Terms -->
                <div class="flex items-start gap-3">
                    <input id="terms" type="checkbox" required 
                        class="mt-1 h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                    <label for="terms" class="text-sm text-gray-600 cursor-pointer">
                        I agree to the <a href="#" class="text-indigo-600 hover:text-indigo-500 font-medium">Terms</a> and <a href="#" class="text-indigo-600 hover:text-indigo-500 font-medium">Privacy Policy</a>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" 
                    class="btn-primary w-full text-white font-semibold py-3 px-4 rounded-xl shadow-lg flex justify-center items-center gap-2">
                    <span>Create Account</span>
                    <i class="ri-arrow-right-line"></i>
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-gray-200 text-center">
                <p class="text-sm text-gray-600">
                    Already have an account? 
                    <button onclick="switchView('login')" class="text-indigo-600 hover:text-indigo-500 font-semibold">Sign In</button>
                </p>
            </div>
        </div>

        <!-- Success View -->
        <div id="successView" class="hidden-view text-center py-8 fade-in">
            <div class="w-24 h-24 bg-gradient-to-br from-green-400 to-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="ri-checkbox-circle-line text-5xl text-white"></i>
            </div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2">Registration Successful!</h3>
            <p class="text-gray-500 mb-8">Your data has been saved to the database.</p>
            <button onclick="location.reload()" class="btn-primary w-full text-white font-semibold py-3 rounded-xl">Register Another</button>
        </div>

    </div>
    <div class="px-8 py-4 bg-gray-50 border-t border-gray-200">
        <p class="text-xs text-gray-500 text-center">🔒 Secured with Firebase</p>
    </div>
</div>

<!-- JAVASCRIPT -->
<script>
    // 🔥 FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyBInthZ2BKHiy1hdvUvBdnngGDTBsceTUE",
        authDomain: "registration-system-8719c.firebaseapp.com",
        projectId: "registration-system-8719c",
        storageBucket: "registration-system-8719c.firebasestorage.app",
        messagingSenderId: "266476222439",
        appId: "1:266476222439:web:f1f06c9bb1b17775d3af42",
        measurementId: "G-WGMF6Y81EM"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // UI Functions
    function togglePassword(id) {
        const input = document.getElementById(id);
        const icon = document.getElementById(`icon-${id}`);
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'ri-eye-line';
        } else {
            input.type = 'password';
            icon.className = 'ri-eye-off-line';
        }
    }

    function checkPasswordStrength(pwd) {
        const bar = document.getElementById('strengthBar');
        let s = 0;
        if (pwd.length >= 6) s++;
        if (pwd.match(/[a-z]/)) s++;
        if (pwd.match(/[A-Z]/)) s++;
        if (pwd.match(/[0-9]/)) s++;
        bar.className = 'password-strength-bar';
        if (s <= 1) bar.classList.add('strength-weak');
        else if (s <= 2) bar.classList.add('strength-fair');
        else if (s <= 3) bar.classList.add('strength-good');
        else bar.classList.add('strength-strong');
    }

    function switchView(v) {
        document.getElementById('registerView').classList.toggle('hidden-view', v !== 'register');
        document.getElementById('successView').classList.toggle('hidden-view', v !== 'success');
    }

    // Form Submit
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const terms = document.getElementById('terms').checked;

        if (fullName.length < 2 || !email.includes('@') || password.length < 6 || password !== confirm || !terms) {
            alert('Please fill all fields correctly');
            return;
        }

        const btn = document.getElementById('submitBtn');
        const orig = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<div class="loading-spinner"></div> Saving...';

        try {
            await db.collection('registrations').add({
                fullName, email, phone, password,
                registeredAt: firebase.firestore.FieldValue.serverTimestamp(),
                country: 'Ethiopia'
            });

            btn.disabled = false;
            btn.innerHTML = orig;
            switchView('success');
            this.reset();
        } catch (err) {
            alert('Error: ' + err.message);
            btn.disabled = false;
            btn.innerHTML = orig;
        }
    });
</script>

</body>
</html>
