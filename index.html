<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoveConnect - Find Your Match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.0.16/index.css" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; min-height: 100vh; }
        .glass-panel { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .btn-primary { background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(236,72,153,0.4); }
        .profile-card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; }
        .profile-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #ec4899; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-bar { background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%); }
        .alert { padding: 0.75rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; display: none; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    </style>
</head>
<body>

<!-- AUTH SECTION (Registration/Login) -->
<div id="authSection" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-panel w-full max-w-lg fade-in">
        <div class="h-2 bg-gradient-to-r from-pink-500 via-purple-500 to-indigo-500"></div>
        <div class="p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-pink-500 to-purple-600 rounded-2xl mb-4 shadow-lg">
                    <i class="ri-heart-3-fill text-3xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800 mb-2">LoveConnect ❤️</h1>
                <p class="text-gray-500 text-sm">Find your perfect match today</p>
            </div>

            <div id="authError" class="alert alert-error"><i class="ri-error-warning-fill"></i> <span id="errorText"></span></div>
            <div id="authSuccess" class="alert alert-success"><i class="ri-checkbox-circle-fill"></i> <span>Registration successful!</span></div>

            <!-- Registration Form -->
            <form id="registerForm" class="space-y-4">
                <input type="text" id="regName" required placeholder="Full Name" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:border-pink-500">
                <input type="email" id="regEmail" required placeholder="Email Address" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:border-pink-500">
                <input type="tel" id="regPhone" placeholder="Phone (Optional)" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:border-pink-500">
                <input type="password" id="regPassword" required minlength="6" placeholder="Password (min 6)" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:border-pink-500">
                <input type="password" id="regConfirm" required placeholder="Confirm Password" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:border-pink-500">
                
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="regTerms" required class="w-4 h-4">
                    <label for="regTerms" class="text-sm text-gray-600">I agree to <a href="#" class="text-pink-600">Terms</a></label>
                </div>

                <button type="submit" id="regBtn" class="btn-primary w-full text-white font-semibold py-3 rounded-xl shadow-lg">
                    Create Account & Start Dating
                </button>
            </form>

            <!-- Login Form (Hidden by default) -->
            <form id="loginForm" class="space-y-4 hidden">
                <input type="email" id="loginEmail" required placeholder="Email Address" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:border-pink-500">
                <input type="password" id="loginPassword" required placeholder="Password" class="w-full px-4 py-2.5 rounded-xl border border-gray-300 focus:outline-none focus:border-pink-500">
                
                <button type="submit" id="loginBtn" class="btn-primary w-full text-white font-semibold py-3 rounded-xl shadow-lg">
                    Sign In to Dating App
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-gray-200 text-center">
                <p class="text-sm text-gray-600">
                    <span id="authToggleText">Already have an account?</span>
                    <button onclick="toggleAuth()" class="text-pink-600 hover:text-pink-500 font-semibold" id="authToggleBtn">Sign In</button>
                </p>
            </div>
        </div>
    </div>
</div>

<!-- DASHBOARD SECTION (Hidden until logged in) -->
<div id="dashboardSection" class="hidden">
    <!-- Navigation -->
    <nav class="nav-bar text-white py-4 px-6 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="ri-heart-3-fill text-2xl"></i>
                <span class="font-bold">LoveConnect</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="showTab('browse')" class="hover:opacity-80"><i class="ri-user-search-line"></i> Browse</button>
                <button onclick="showTab('matches')" class="hover:opacity-80"><i class="ri-heart-line"></i> Matches</button>
                <button onclick="logout()" class="hover:opacity-80"><i class="ri-logout-box-line"></i> Logout</button>
            </div>
        </div>
    </nav>

    <!-- Browse Users -->
    <div id="browseTab" class="max-w-6xl mx-auto p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Discover People</h2>
        <div id="usersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="flex justify-center py-10"><div class="loading-spinner"></div></div>
        </div>
    </div>

    <!-- Matches Tab -->
    <div id="matchesTab" class="hidden max-w-6xl mx-auto p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Your Matches 💕</h2>
        <div id="matchesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
</div>

<script>
    // 🔥 FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyBInthZ2BKHiy1hdvUvBdnngGDTBsceTUE",
        authDomain: "registration-system-8719c.firebaseapp.com",
        projectId: "registration-system-8719c",
        storageBucket: "registration-system-8719c.firebasestorage.app",
        messagingSenderId: "266476222439",
        appId: "1:266476222439:web:f1f06c9bb1b17775d3af42"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;

    // Check auth state on load
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            loadUsers();
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
        }
    });

    // Toggle Register/Login
    let isRegister = true;
    function toggleAuth() {
        isRegister = !isRegister;
        document.getElementById('registerForm').classList.toggle('hidden', !isRegister);
        document.getElementById('loginForm').classList.toggle('hidden', isRegister);
        document.getElementById('authToggleText').textContent = isRegister ? 'Already have an account?' : "Don't have an account?";
        document.getElementById('authToggleBtn').textContent = isRegister ? 'Sign In' : 'Sign Up';
        document.querySelectorAll('.alert').forEach(el => el.style.display = 'none');
    }

    // Registration
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        const terms = document.getElementById('regTerms').checked;

        if (password !== confirm) { alert('Passwords do not match'); return; }
        if (!terms) { alert('Accept terms to continue'); return; }

        const btn = document.getElementById('regBtn');
        btn.disabled = true;
        btn.innerHTML = '<div class="loading-spinner"></div> Creating...';

        try {
            // Create Firebase Auth account
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            
            // Save profile to Firestore
            await db.collection('registrations').doc(userCredential.user.uid).set({
                fullName: name, email, phone,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                uid: userCredential.user.uid
            });

            // Auto-login succeeds, onAuthStateChanged will show dashboard
            document.getElementById('authSuccess').style.display = 'flex';
            this.reset();
        } catch (error) {
            alert('Error: ' + error.message);
            btn.disabled = false;
            btn.innerHTML = 'Create Account & Start Dating';
        }
    });

    // Login
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        
        btn.disabled = true;
        btn.innerHTML = '<div class="loading-spinner"></div> Signing In...';

        try {
            await auth.signInWithEmailAndPassword(email, password);
            // onAuthStateChanged handles redirect
        } catch (error) {
            alert('Login failed: ' + error.message);
            btn.disabled = false;
            btn.innerHTML = 'Sign In to Dating App';
        }
    });

    // Load Users for Browsing
    async function loadUsers() {
        const snapshot = await db.collection('registrations').get();
        const users = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            if (data.email !== currentUser.email) users.push({ id: doc.id, ...data });
        });
        displayUsers(users);
    }

    function displayUsers(users) {
        const grid = document.getElementById('usersGrid');
        if (users.length === 0) {
            grid.innerHTML = '<p class="text-gray-500 text-center col-span-3 py-10">Be the first! Invite friends to join.</p>';
            return;
        }
        grid.innerHTML = users.map(user => `
            <div class="profile-card">
                <div class="h-40 bg-gradient-to-br from-pink-400 to-purple-500 flex items-center justify-center">
                    <i class="ri-user-line text-5xl text-white/50"></i>
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-lg">${user.fullName || 'Anonymous'}</h3>
                    <p class="text-gray-500 text-sm">${user.email?.split('@')[0]}***</p>
                    <button onclick="likeUser('${user.id}', '${user.email}')" class="btn-primary w-full text-white py-2 rounded-lg mt-3 font-medium">
                        <i class="ri-heart-fill"></i> Like
                    </button>
                </div>
            </div>
        `).join('');
    }

    // Like System
    async function likeUser(userId, userEmail) {
        try {
            await db.collection('likes').add({
                from: currentUser.email, to: userEmail,
                fromId: currentUser.uid, toId: userId,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            // Check for mutual like = MATCH
            const mutual = await db.collection('likes')
                .where('from', '==', userEmail)
                .where('to', '==', currentUser.email)
                .limit(1).get();
            
            if (!mutual.empty) {
                await db.collection('matches').add({
                    user1: currentUser.email, user2: userEmail,
                    user1Id: currentUser.uid, user2Id: userId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('🎉 It\'s a Match! You can now chat!');
                loadMatches();
            } else {
                alert('❤️ You liked them! Wait for mutual interest.');
            }
        } catch (error) { alert('Error: ' + error.message); }
    }

    // Load Matches
    async function loadMatches() {
        const snapshot = await db.collection('matches')
            .where('user1', '==', currentUser.email).get();
        const matches = [];
        snapshot.forEach(doc => matches.push(doc.data()));
        
        const grid = document.getElementById('matchesGrid');
        if (matches.length === 0) {
            grid.innerHTML = '<p class="text-gray-500 text-center col-span-3 py-10">No matches yet. Keep liking!</p>';
            return;
        }
        grid.innerHTML = matches.map(match => {
            const other = match.user1 === currentUser.email ? match.user2 : match.user1;
            return `
                <div class="profile-card border-2 border-pink-300">
                    <div class="h-32 bg-gradient-to-br from-green-400 to-emerald-500 flex items-center justify-center">
                        <i class="ri-heart-fill text-4xl text-white"></i>
                    </div>
                    <div class="p-4 text-center">
                        <h3 class="font-bold text-lg">${other}</h3>
                        <p class="text-green-600 text-sm"><i class="ri-checkbox-circle-fill"></i> Matched!</p>
                        <button class="btn-primary w-full text-white py-2 rounded-lg mt-3">
                            <i class="ri-message-line"></i> Chat
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Tab Switching
    function showTab(tab) {
        document.getElementById('browseTab').classList.toggle('hidden', tab !== 'browse');
        document.getElementById('matchesTab').classList.toggle('hidden', tab !== 'matches');
        if (tab === 'matches') loadMatches();
    }

    // Logout
    function logout() { auth.signOut(); }
</script>
</body>
</html>
